name: Build and Deploy
on:
  push:
  schedule:
    - cron: '0 2 * * *' # Rebuild daily at 2 AM UTC to pick up new Notion content

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /yuweichen1008
    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 🔧
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: true
          NODE_OPTIONS: --openssl-legacy-provider
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_JOURNAL: ${{ secrets.NOTION_DB_JOURNAL }}
          NOTION_DB_TIMELINE: ${{ secrets.NOTION_DB_TIMELINE }}
          NOTION_DB_FOOD_LOG: ${{ secrets.NOTION_DB_FOOD_LOG }}
          NOTION_DB_ADVENTURES: ${{ secrets.NOTION_DB_ADVENTURES }}
          NOTION_DB_FITNESS: ${{ secrets.NOTION_DB_FITNESS }}
          NOTION_DB_DAILY_STATS: ${{ secrets.NOTION_DB_DAILY_STATS }}
          NOTION_DB_NOW_STATUS: ${{ secrets.NOTION_DB_NOW_STATUS }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: build
          clean: true
