name: Build and Deploy
on:
  push:
  schedule:
    - cron: '0 2 * * *' # Rebuild daily at 2 AM UTC to pick up new Notion content

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /yuweichen1008
    defaults:
      run:
        working-directory: ./src

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - name: Cache 💾
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}

      - name: Install and Build 🔧
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - run: npm install
      - run: npm run build
        env:
          CI: true
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_JOURNAL: ${{ secrets.NOTION_DB_JOURNAL }}
          NOTION_DB_TIMELINE: ${{ secrets.NOTION_DB_TIMELINE }}
          NOTION_DB_FOOD_LOG: ${{ secrets.NOTION_DB_FOOD_LOG }}
          NOTION_DB_ADVENTURES: ${{ secrets.NOTION_DB_ADVENTURES }}
          NOTION_DB_FITNESS: ${{ secrets.NOTION_DB_FITNESS }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.0
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: src/out
          CLEAN: true
